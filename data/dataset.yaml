# YOLO training config — swarm agri-vision
#
# LABELING TOOLS (export as "YOLOv8" format):
#   Roboflow  https://roboflow.com   (easiest, cloud-based)
#   CVAT      https://cvat.ai        (self-hostable, open source)
#
# DATASET STRUCTURE (place under data/images/):
#   data/images/
#     train/images/   *.jpg
#     train/labels/   *.txt   (auto-generated by labeling tool)
#     val/images/
#     val/labels/
#
# TRAINING (from project root, after labeling):
#   yolo train model=yolov8n.pt data=data/dataset.yaml epochs=50 imgsz=640
#
# After training, update MODEL_PATH in src/vision.py:
#   MODEL_PATH = "runs/detect/train/weights/best.pt"

path: data/images # dataset root relative to project root
train: train
val: val

nc: 3
names:
  0: weed
  1: crop
  2: ready-to-harvest
