name: Static Analysis

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "**"

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Lint
        run: |
          nix develop -c treefmt --config-file treefmt.lint.toml --ci

      - name: Format
        run: |
          nix develop -c treefmt --config-file treefmt.toml --ci
