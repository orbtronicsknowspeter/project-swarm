[formatter.clang-format]
command = "clang-format"
excludes = []
includes = [
    "*.c",
    "*.cc",
    "*.cpp",
    "*.h",
    "*.hh",
    "*.hpp",
    "*.glsl",
    "*.vert",
    ".tesc",
    ".tese",
    ".geom",
    ".frag",
    ".comp",
]
options = []

[formatter.clang-tidy]
command = "clang-tidy"
excludes = []
includes = [
    "*.c",
    "*.cc",
    "*.cpp",
    "*.h",
    "*.hh",
    "*.hpp",
    "*.glsl",
    "*.vert",
    ".tesc",
    ".tese",
    ".geom",
    ".frag",
    ".comp",
]
options = []

[formatter.cmake-format]
command = "cmake-format"
excludes = []
includes = ["*.cmake", "CMakeLists.txt"]
options = []

[formatter.nixfmt]
command = "nixfmt"
excludes = []
includes = ["*.nix"]
options = ["--check"]

[formatter.prettier]
command = "prettier"
excludes = []
includes = [
  "*.cjs",
  "*.css",
  "*.html",
  "*.js",
  "*.json",
  "*.json5",
  "*.jsx",
  "*.md",
  "*.mdx",
  "*.mjs",
  "*.scss",
  "*.ts",
  "*.tsx",
  "*.vue",
  "*.yaml",
  "*.yml",
]
options = ["--check"]

[formatter.ruff-check]
command = "ruff"
excludes = []
includes = ["*.py", "*.pyi"]
options = ["check"]

[formatter.taplo]
command = "taplo"
excludes = []
includes = ["*.toml"]
options = ["check"]